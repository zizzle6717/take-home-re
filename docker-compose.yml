services:
  postgres:
    image: postgres:15-alpine
    container_name: renewal_risk_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: renewal_risk
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d renewal_risk"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: renewal_risk_backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/renewal_risk
      # NOTE: inside the docker network, postgres listens on its native 5432.
      # The host-side mapping is 5434 (see postgres service ports above) to avoid
      # conflicts with other local Postgres instances.
      PORT: 3000
      RMS_WEBHOOK_URL: http://localhost:3000/__mock_rms/webhook
      WORKER_POLL_MS: 1000
      WEBHOOK_MAX_ATTEMPTS: 5
      MOCK_RMS_FAILURE_RATE: 0
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  pgdata:
